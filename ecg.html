<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioShirt ECG Dashboard (USB)</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }
        .bpm-display {
            font-size: 48px;
            font-weight: bold;
            color: #ff4757;
        }
        .bpm-display span { font-size: 20px; color: #a4b0be; font-weight: normal; }
        button {
            background-color: #009432;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #05c46b; }
        canvas {
            background-color: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #2f3542;
        }
        #status { margin-top: 15px; color: #7bed9f; font-size: 16px; font-weight: bold; }
        .warning { color: #ffa502; font-size: 13px; margin-top: 5px; }
        #rawData {
            margin-top: 20px;
            font-family: monospace;
            color: #747d8c;
            font-size: 12px;
            background: #2f3542;
            padding: 8px 16px;
            border-radius: 4px;
            width: 100%;
            max-width: 768px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="header">
        <button id="connectBtn">Connect USB (Serial)</button>
        <div class="bpm-display"><span id="bpmValue">--</span> <span>BPM</span></div>
    </div>

    <canvas id="ecgChart" width="800" height="400"></canvas>
    
    <div id="status">Ready to connect...</div>
    <div class="warning">Note: Close the Arduino Serial Monitor before connecting!</div>
    
    <div id="rawData">Waiting for data stream...</div>

    <script>
        const canvas = document.getElementById('ecgChart');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const bpmValue = document.getElementById('bpmValue');
        const rawDataLog = document.getElementById('rawData');
        
        let ecgData = new Array(800).fill(0);
        let isDrawing = false;
        let serialBuffer = "";

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                if (!('serial' in navigator)) {
                    throw new Error("Web Serial API not supported in this browser. Please use Chrome or Edge.");
                }

                const port = await navigator.serial.requestPort();
                
                await port.open({ baudRate: 115200 });
                
                // FIX: Force DTR and RTS signals so native USB stacks know the host is listening
                await port.setSignals({ dataTerminalReady: true, requestToSend: true });
                
                statusText.innerText = "Connected & Receiving USB Data!";
                statusText.style.color = "#7bed9f";

                if (!isDrawing) {
                    isDrawing = true;
                    drawChart();
                }

                const decoder = new TextDecoderStream();
                const inputDone = port.readable.pipeTo(decoder.writable);
                const inputStream = decoder.readable;
                const reader = inputStream.getReader();

                readLoop(reader);

            } catch (error) {
                console.error(error);
                statusText.innerText = "Error: " + error.message;
                statusText.style.color = "#ff4757";
            }
        });

        async function readLoop(reader) {
            while (true) {
                const { value, done } = await reader.read();
                if (value) {
                    serialBuffer += value;
                    processBuffer();
                }
                if (done) {
                    reader.releaseLock();
                    break;
                }
            }
        }

        function processBuffer() {
            let lines = serialBuffer.split('\n');
            serialBuffer = lines.pop(); // Keep the incomplete line for the next chunk

            lines.forEach(line => {
                line = line.trim();
                if (line.length === 0) return;

                // Debug: Show the raw data arriving so we know hardware is transmitting
                rawDataLog.innerText = "Raw RX: " + line;

                // Expected Format: Raw,Filtered,QRS,LeadsOff,BPM
                const parts = line.split(',');
                if (parts.length >= 5) {
                    const filtECG = parseFloat(parts[1]);
                    const bpm = parseInt(parts[4]);

                    if (!isNaN(bpm) && bpm > 0) {
                        bpmValue.innerText = bpm;
                    }

                    if (!isNaN(filtECG)) {
                        ecgData.shift();
                        ecgData.push(filtECG);
                    }
                }
            });
        }

        function drawChart() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#2f3542';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let y=0; y<canvas.height; y+=40) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
            for(let x=0; x<canvas.width; x+=40) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
            ctx.stroke();

            ctx.strokeStyle = '#2ed573';
            ctx.lineWidth = 2;
            ctx.beginPath();

            const centerY = canvas.height / 2;
            // Increase or decrease scaleY to fit your specific ECG voltage sweep
            const scaleY = 1.5; 

            for (let i = 0; i < ecgData.length; i++) {
                const x = i;
                const y = centerY - (ecgData[i] * scaleY); 
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            requestAnimationFrame(drawChart);
        }
    </script>
</body>
</html>
