      rel="stylesheet"

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      /* Standard Sensor Style (Left Side) */
      .insole-zone {
        transition: fill 0.1s ease; /* Smoother transition */
        stroke: #374151;
        stroke-width: 1.5;
        stroke-linejoin: round;
        stroke-dasharray: 4 2;
      }
      .insole-zone-text {
        font-size: 18px;
        font-weight: 700;
        fill: #1f2937;
        pointer-events: none;
        text-anchor: middle;
        dominant-baseline: middle;
        opacity: 0.7;
      }

      /* Heatmap Style (Right Side) */
      .heatmap-blob {
        transition:
          opacity 0.1s ease,
          fill 0.1s ease;
        mix-blend-mode: multiply; /* Helps colors blend */
      }

      /* CoP Marker */
      #cop-marker {
        transition:
          cx 0.1s linear,
          cy 0.1s linear,
          opacity 0.2s;
        pointer-events: none;
        filter: drop-shadow(0px 0px 2px rgba(0, 0, 0, 0.5));
      }

      .btn-disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      @keyframes blink {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
        100% {
          opacity: 1;
        }
      }
      .recording-dot {
        animation: blink 1.5s infinite;
      }
    </style>

    <script>
      const connectUsbBtn = document.getElementById("connect-usb-button");
      const connectBleBtn = document.getElementById("connect-ble-button");
      const statusDisplay = document.getElementById("status-display");
      const rawDisplay = document.getElementById("raw-data-display");
      const copXDisplay = document.getElementById("cop-x");
      const copYDisplay = document.getElementById("cop-y");

      // Recording Elements
      const recordBtn = document.getElementById("record-button");
      const recordStatus = document.getElementById("record-status");
      const recordingIndicator = document.getElementById("recording-indicator");

      // BLE Config
      const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
      const CHARACTERISTIC_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";

      // Global State
      let bluetoothDevice;
      let serialPort;
      let serialReader;
      let isConnected = false;
      let isRecording = false;
      let recordedData = [];
      let startTime = 0;

      const coords = [
        { x: 255, y: 70 },
        { x: 175, y: 65 },
        { x: 115, y: 80 },
        { x: 65, y: 110 },
        { x: 285, y: 200 },
        { x: 205, y: 180 },
        { x: 125, y: 200 },
        { x: 60, y: 250 },
        { x: 60, y: 332 },
        { x: 190, y: 380 },
        { x: 70, y: 410 },
        { x: 90, y: 490 },
        { x: 155, y: 540 },
        { x: 210, y: 610 },
        { x: 160, y: 680 },
        { x: 105, y: 610 },
      ];

      // Check API Support
      if (!("bluetooth" in navigator))
        disableBtn(connectBleBtn, "Bluetooth not supported");
      if (!("serial" in navigator))
        disableBtn(connectUsbBtn, "Web Serial not supported");

      function disableBtn(btn, msg) {
        btn.disabled = true;
        btn.classList.add("btn-disabled");
        btn.title = msg;
      }

      function updateUIConnected(mode) {
        isConnected = true;
        statusDisplay.textContent = `🟢 Connected via ${mode}`;
        statusDisplay.className =
          "mt-4 text-sm text-center text-green-600 font-bold";
        recordBtn.disabled = false;
        recordBtn.classList.remove("btn-disabled");

        if (mode === "USB") {
          connectUsbBtn.textContent = "Disconnect USB";
          connectUsbBtn.classList.replace("bg-blue-600", "bg-red-600");
          disableBtn(connectBleBtn, "Busy");
        } else {
          connectBleBtn.textContent = "Disconnect BLE";
          connectBleBtn.classList.replace("bg-indigo-600", "bg-red-600");
          disableBtn(connectUsbBtn, "Busy");
        }
      }

      function updateUIDisconnected() {
        isConnected = false;
        statusDisplay.textContent = "Disconnected.";
        statusDisplay.className =
          "mt-4 text-sm text-center text-gray-500 font-mono";
        if (isRecording) stopRecording();
        recordBtn.disabled = true;
        recordBtn.classList.add("btn-disabled");
        connectUsbBtn.disabled = false;
        connectUsbBtn.textContent = "Connect USB Serial";
        connectUsbBtn.className =
          "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition duration-200 shadow-sm flex items-center justify-center gap-2";
        connectBleBtn.disabled = false;
        connectBleBtn.textContent = "Connect Bluetooth";
        connectBleBtn.className =
          "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition duration-200 shadow-sm flex items-center justify-center gap-2";
        resetColors();
      }

      // ============================================
      //  LOGIC: RAW -> NEWTONS
      // ============================================
      function rawToNewtons(raw) {
        if (raw < 3) return 0.0;
        let v = (raw / 255.0) * 3.3;
        if (v < 0.01) return 0.0;
        let r_fsr = (3.3 * 10000) / v - 10000;
        if (r_fsr < 100) r_fsr = 100;
        let force = 1000000 / r_fsr;
        return parseFloat(force.toFixed(1));
      }

      // ============================================
      //  LOGIC: RECORDING
      // ============================================
      recordBtn.addEventListener("click", () => {
        if (!isRecording) startRecording();
        else stopRecording();
      });

      function startRecording() {
        isRecording = true;
        recordedData = [];
        startTime = Date.now();
        recordBtn.textContent = "Stop Recording & Save";
        recordBtn.classList.replace("bg-gray-700", "bg-red-600");
        recordBtn.classList.replace("hover:bg-gray-800", "hover:bg-red-700");
        recordingIndicator.classList.remove("hidden");
        recordStatus.textContent = "Recording...";
      }

      function stopRecording() {
        isRecording = false;
        recordBtn.textContent = "Start Recording CSV";
        recordBtn.classList.replace("bg-red-600", "bg-gray-700");
        recordBtn.classList.replace("hover:bg-red-700", "hover:bg-gray-800");
        recordingIndicator.classList.add("hidden");
        if (recordedData.length > 0) {
          downloadCSV();
          recordStatus.textContent = `Saved ${recordedData.length} samples.`;
        } else {
          recordStatus.textContent = "No data collected.";
        }
      }

      function saveSample(dataArray) {
        if (!isRecording) return;
        const timeOffset = Date.now() - startTime;
        const forceArray = Array.from(dataArray).map((val) =>
          rawToNewtons(val),
        );
        const row = [timeOffset, ...forceArray];
        recordedData.push(row);
        if (recordedData.length % 10 === 0) {
          recordStatus.textContent = `${recordedData.length} samples collected`;
        }
      }

      function downloadCSV() {
        let csvContent =
          "Time(ms),F0,F1,F2,F3,F4,F5,F6,F7,F8,F9,F10,F11,F12,F13,F14,F15\n";
        csvContent += recordedData.map((e) => e.join(",")).join("\n");
        const blob = new Blob([csvContent], {
          type: "text/csv;charset=utf-8;",
        });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        const date = new Date();
        const timestamp = date.toISOString().replace(/[:.]/g, "-");
        link.setAttribute("href", url);
        link.setAttribute("download", `insole_force_data_${timestamp}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      // ============================================
      //  USB SERIAL & BLE
      // ============================================
      connectUsbBtn.addEventListener("click", async () => {
        if (serialPort) await disconnectSerial();
        else await connectSerial();
      });

      async function connectSerial() {
        try {
          serialPort = await navigator.serial.requestPort();
          await serialPort.open({ baudRate: 115200 });
          updateUIConnected("USB");
          readSerialLoop();
        } catch (err) {
          console.error(err);
          statusDisplay.textContent = "USB Error: " + err.message;
        }
      }

      async function disconnectSerial() {
        if (serialReader) await serialReader.cancel();
      }

      async function readSerialLoop() {
        const textDecoder = new TextDecoderStream();
        serialReader = serialPort.readable.getReader();
        let buffer = new Uint8Array(0);
        try {
          while (true) {
            const { value, done } = await serialReader.read();
            if (done) break;
            const newBuffer = new Uint8Array(buffer.length + value.length);
            newBuffer.set(buffer);
            newBuffer.set(value, buffer.length);
            buffer = newBuffer;
            while (buffer.length >= 16) {
              const packet = buffer.slice(0, 16);
              processPacket(packet);
              buffer = buffer.slice(16);
            }
          }
        } catch (err) {
          console.error(err);
        } finally {
          serialReader.releaseLock();
          await serialPort.close();
          serialPort = null;
          updateUIDisconnected();
        }
      }

      connectBleBtn.addEventListener("click", async () => {
        if (bluetoothDevice && bluetoothDevice.gatt.connected)
          bluetoothDevice.gatt.disconnect();
        else connectBle();
      });

      async function connectBle() {
        try {
          bluetoothDevice = await navigator.bluetooth.requestDevice({
            filters: [{ services: [SERVICE_UUID] }],
          });
          bluetoothDevice.addEventListener(
            "gattserverdisconnected",
            updateUIDisconnected,
          );
          const server = await bluetoothDevice.gatt.connect();
          const service = await server.getPrimaryService(SERVICE_UUID);
          const characteristic =
            await service.getCharacteristic(CHARACTERISTIC_UUID);
          await characteristic.startNotifications();
          characteristic.addEventListener(
            "characteristicvaluechanged",
            handleBleData,
          );
          updateUIConnected("BLE");
        } catch (err) {
          statusDisplay.textContent = "BLE Error: " + err.message;
        }
      }

      function handleBleData(event) {
        const dataView = event.target.value;
        const packet = new Uint8Array(dataView.buffer);
        processPacket(packet);
      }

      // ============================================
      //  CORE VISUALIZATION (HEATMAP & CoP)
      // ============================================
      function processPacket(dataArray) {
        updateVisuals(dataArray);
        updateCoP(dataArray);
        saveSample(dataArray);
      }

      function updateVisuals(dataArray) {
        let rawHtml = "";
        for (let i = 0; i < 16; i++) {
          const rawVal = dataArray[i];
          const forceVal = rawToNewtons(rawVal);
          const color = getHeatMapColor(rawVal); // Unified Color Function

          // 1. Update Standard Sensor Map (Left)
          const zoneEl = document.getElementById(`zone-${i}`);
          if (zoneEl) zoneEl.style.fill = color;

          // 2. Update Gradient Heatmap (Right)
          const heatEl = document.getElementById(`heat-${i}`);
          if (heatEl) {
            const opacity = Math.min(rawVal / 150, 1); // Opacity helps blending
            heatEl.style.fill = color;
            heatEl.style.opacity = opacity;
          }

          rawHtml += `<div class="bg-gray-800 p-1 rounded text-white font-mono text-sm" title="Raw: ${rawVal}">S${i}:${forceVal}</div>`;
        }
        rawDisplay.innerHTML = rawHtml;
      }

      function updateCoP(dataArray) {
        let totalForce = 0;
        let weightedX = 0;
        let weightedY = 0;

        for (let i = 0; i < 16; i++) {
          const rawVal = dataArray[i];
          if (rawVal > 10) {
            // Threshold to avoid noise
            weightedX += rawVal * coords[i].x;
            weightedY += rawVal * coords[i].y;
            totalForce += rawVal;
          }
        }

        const copMarker = document.getElementById("cop-marker");
        const copMarkerInner = copMarker.querySelector("circle");

        if (totalForce > 0) {
          const copX = weightedX / totalForce;
          const copY = weightedY / totalForce;

          // Move Marker
          copMarkerInner.setAttribute("cx", copX);
          copMarkerInner.setAttribute("cy", copY);

          // Move crosshair lines
          const lines = copMarker.querySelectorAll("line");
          lines[0].setAttribute("x1", copX - 5);
          lines[0].setAttribute("x2", copX + 5);
          lines[0].setAttribute("y1", copY);
          lines[0].setAttribute("y2", copY);

          lines[1].setAttribute("x1", copX);
          lines[1].setAttribute("x2", copX);
          lines[1].setAttribute("y1", copY - 5);
          lines[1].setAttribute("y2", copY + 5);

          copMarker.style.opacity = 1;

          copXDisplay.textContent = copX.toFixed(0);
          copYDisplay.textContent = copY.toFixed(0);
        } else {
          copMarker.style.opacity = 0;
        }
      }

      function getHeatMapColor(value) {
        if (value < 15) return "#d1d5db"; // Grey if idle
        const normalized = value / 255;
        // 120 (Green) -> 0 (Red)
        const hue = 120 - normalized * 120;
        return `hsl(${hue}, 100%, 50%)`;
      }

      function resetColors() {
        for (let i = 0; i < 16; i++) {
          const zoneEl = document.getElementById(`zone-${i}`);
          if (zoneEl) zoneEl.style.fill = "#d1d5db";
          const heatEl = document.getElementById(`heat-${i}`);
          if (heatEl) {
            heatEl.style.fill = "transparent";
            heatEl.style.opacity = 0;
          }
        }
        document.getElementById("cop-marker").style.opacity = 0;
        rawDisplay.innerHTML = "";
      }
    </script>
  </body>
</html>
