<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometrics Dashboard (With Export)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 10px;
        }
        .bpm-display {
            font-size: 32px;
            font-weight: bold;
            color: #ff3366;
            background: #222;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #444;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #005f9e; }
        button:disabled { background-color: #444; color: #888; cursor: not-allowed; }
        .export-btn { background-color: #28a745; }
        .export-btn:hover { background-color: #218838; }
        
        .plot-container {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
        }
        .plot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        h3 { margin: 0; color: #ccc; font-size: 16px; }
        canvas {
            border: 2px solid #333;
            border-radius: 8px;
            width: 100%;
            height: 250px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Live Biometrics</h2>
        <div class="bpm-display">BPM: <span id="bpmValue">--</span></div>
        <div class="btn-group">
            <button id="connectBtn">Connect Device</button>
            <button id="disconnectBtn" disabled>Disconnect</button>
        </div>
    </div>

    <div class="plot-container">
        <div class="plot-header">
            <h3>ECG (Heart)</h3>
            <div class="btn-group">
                <button class="export-btn" id="saveEcgCsvBtn">💾 Save ECG CSV</button>
                <button class="export-btn" id="saveEcgPlotBtn">📷 Save ECG Plot</button>
            </div>
        </div>
        <canvas id="ecgCanvas" width="1000" height="250"></canvas>
    </div>

    <div class="plot-container">
        <div class="plot-header">
            <h3>EMG (Muscle Activity) - Raw (Blue) & Envelope (Orange)</h3>
            <div class="btn-group">
                <button class="export-btn" id="saveEmgCsvBtn">💾 Save EMG CSV</button>
                <button class="export-btn" id="saveEmgPlotBtn">📷 Save EMG Plot</button>
            </div>
        </div>
        <canvas id="emgCanvas" width="1000" height="250"></canvas>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const bpmDisplay = document.getElementById('bpmValue');
        
        const ecgCanvas = document.getElementById('ecgCanvas');
        const emgCanvas = document.getElementById('emgCanvas');
        const ecgCtx = ecgCanvas.getContext('2d');
        const emgCtx = emgCanvas.getContext('2d');

        let port;
        let reader;
        let keepReading = false;
        let sessionStartTime = 0;

        // Visual Rolling Buffers (only holds the last 2 seconds for the screen)
        const maxSamples = 1000; 
        let ecgData = new Array(maxSamples).fill(0);
        let qrsData = new Array(maxSamples).fill(0);
        let emgAcData = new Array(maxSamples).fill(0);
        let emgEnvData = new Array(maxSamples).fill(0);

        // Auto-scaling trackers
        let ecgMin = -100, ecgMax = 100;
        let emgMin = -0.5, emgMax = 0.5;

        // --- EXPORT DATA LOGS (holds entire session) ---
        let sessionEcgLog = [];
        let sessionEmgLog = [];

        connectBtn.addEventListener('click', async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                // Reset logs for new session
                sessionEcgLog = [];
                sessionEmgLog = [];
                sessionStartTime = Date.now();

                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                keepReading = true;
                
                readLoop();
                requestAnimationFrame(drawPlots);
            } catch (err) {
                console.error(err);
                alert("Connection failed. Make sure Arduino IDE is closed.");
            }
        });

        disconnectBtn.addEventListener('click', async () => {
            keepReading = false;
            if (reader) await reader.cancel();
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            bpmDisplay.innerText = "--";
        });

        async function readLoop() {
            const textDecoder = new TextDecoderStream();
            port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();
            let incomingData = "";

            try {
                while (keepReading) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    incomingData += value;
                    const lines = incomingData.split('\n');
                    incomingData = lines.pop(); // Keep partial line

                    const now = Date.now() - sessionStartTime;

                    for (const line of lines) {
                        const parts = line.split(',');
                        if (parts.length === 5) {
                            const ecg = parseFloat(parts[0]) || 0;
                            const qrs = parseFloat(parts[1]) || 0;
                            const bpm = parseFloat(parts[2]) || 0;
                            const emgAc = parseFloat(parts[3]) || 0;
                            const emgEnv = parseFloat(parts[4]) || 0;

                            // 1. Update Visual Buffers
                            ecgData.push(ecg);
                            qrsData.push(qrs);
                            emgAcData.push(emgAc);
                            emgEnvData.push(emgEnv);
                            
                            ecgData.shift(); qrsData.shift();
                            emgAcData.shift(); emgEnvData.shift();
                            
                            if (bpm > 0) bpmDisplay.innerText = Math.round(bpm);

                            // 2. Log to Background Data Arrays for CSV
                            sessionEcgLog.push(`${now},${ecg},${qrs},${bpm}`);
                            sessionEmgLog.push(`${now},${emgAc},${emgEnv}`);
                        }
                    }
                }
            } finally {
                reader.releaseLock();
                await port.close();
            }
        }

        function drawGrid(ctx, width, height) {
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i=0; i<height; i+=50) { ctx.moveTo(0, i); ctx.lineTo(width, i); }
            for(let i=0; i<width; i+=50) { ctx.moveTo(i, 0); ctx.lineTo(i, height); }
            ctx.stroke();
        }

        function drawPlots() {
            if (!keepReading) return;

            const width = 1000;
            const height = 250;
            const stepX = width / maxSamples;

            // --- Draw ECG ---
            // Use solid fill instead of clearRect so saved PNGs aren't transparent
            ecgCtx.fillStyle = '#000000';
            ecgCtx.fillRect(0, 0, width, height);
            drawGrid(ecgCtx, width, height);

            const cEcgMin = Math.min(...ecgData);
            const cEcgMax = Math.max(...ecgData);
            ecgMin = ecgMin * 0.95 + cEcgMin * 0.05;
            ecgMax = ecgMax * 0.95 + cEcgMax * 0.05;
            const ecgRange = (ecgMax - ecgMin) || 1;

            // QRS markers
            ecgCtx.fillStyle = 'rgba(255, 51, 102, 0.3)';
            for (let i = 0; i < maxSamples; i++) {
                if (qrsData[i] > 0) ecgCtx.fillRect(i * stepX - 2, 0, 4, height);
            }

            // ECG Signal
            ecgCtx.strokeStyle = '#00ff66';
            ecgCtx.lineWidth = 2;
            ecgCtx.beginPath();
            for (let i = 0; i < maxSamples; i++) {
                const x = i * stepX;
                const y = height - (((ecgData[i] - ecgMin) / ecgRange) * height);
                i === 0 ? ecgCtx.moveTo(x, y) : ecgCtx.lineTo(x, y);
            }
            ecgCtx.stroke();


            // --- Draw EMG ---
            emgCtx.fillStyle = '#000000';
            emgCtx.fillRect(0, 0, width, height);
            drawGrid(emgCtx, width, height);

            const cEmgMin = Math.min(...emgAcData);
            const cEmgMax = Math.max(...emgAcData);
            emgMin = Math.min(-0.2, emgMin * 0.95 + cEmgMin * 0.05);
            emgMax = Math.max(0.2, emgMax * 0.95 + cEmgMax * 0.05);
            const emgRange = (emgMax - emgMin) || 1;

            // EMG AC (Raw)
            emgCtx.strokeStyle = '#3399ff'; 
            emgCtx.lineWidth = 1.5;
            emgCtx.beginPath();
            for (let i = 0; i < maxSamples; i++) {
                const x = i * stepX;
                const y = height - (((emgAcData[i] - emgMin) / emgRange) * height);
                i === 0 ? emgCtx.moveTo(x, y) : emgCtx.lineTo(x, y);
            }
            emgCtx.stroke();

            // EMG Envelope (Smoothed)
            emgCtx.strokeStyle = '#ffcc00'; 
            emgCtx.lineWidth = 3;
            emgCtx.beginPath();
            for (let i = 0; i < maxSamples; i++) {
                const x = i * stepX;
                const y = height - (((emgEnvData[i] - emgMin) / emgRange) * height);
                i === 0 ? emgCtx.moveTo(x, y) : emgCtx.lineTo(x, y);
            }
            emgCtx.stroke();

            requestAnimationFrame(drawPlots);
        }

        // ================= EXPORT FUNCTIONS =================

        function downloadCSV(filename, header, dataArray) {
            if (dataArray.length === 0) {
                alert("No data collected yet. Please connect the device first.");
                return;
            }
            const csvContent = header + "\n" + dataArray.join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function downloadImage(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const url = canvas.toDataURL("image/png");
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
        }

        // Button Listeners
        document.getElementById('saveEcgCsvBtn').addEventListener('click', () => {
            downloadCSV('ecg_data.csv', 'Timestamp_ms,Filtered_ECG,QRS_Marker,BPM', sessionEcgLog);
        });

        document.getElementById('saveEmgCsvBtn').addEventListener('click', () => {
            downloadCSV('emg_data.csv', 'Timestamp_ms,EMG_AC_Volts,EMG_Envelope_Volts', sessionEmgLog);
        });

        document.getElementById('saveEcgPlotBtn').addEventListener('click', () => {
            downloadImage('ecgCanvas', 'ecg_plot_snapshot.png');
        });

        document.getElementById('saveEmgPlotBtn').addEventListener('click', () => {
            downloadImage('emgCanvas', 'emg_plot_snapshot.png');
        });

    </script>
</body>
</html>
