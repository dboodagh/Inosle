<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometrics Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 10px;
        }
        .bpm-display {
            font-size: 32px;
            font-weight: bold;
            color: #ff3366;
            background: #222;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #444;
        }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #005f9e; }
        button:disabled { background-color: #444; color: #888; cursor: not-allowed; }
        
        .plot-container {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
        }
        h3 { margin: 0 0 5px 0; color: #ccc; font-size: 16px; }
        canvas {
            background-color: #000000;
            border: 2px solid #333;
            border-radius: 8px;
            width: 100%;
            height: 250px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Live Biometrics</h2>
        <div class="bpm-display">BPM: <span id="bpmValue">--</span></div>
        <div>
            <button id="connectBtn">Connect Device</button>
            <button id="disconnectBtn" disabled>Disconnect</button>
        </div>
    </div>

    <div class="plot-container">
        <h3>ECG (Heart)</h3>
        <canvas id="ecgCanvas" width="1000" height="250"></canvas>
    </div>

    <div class="plot-container">
        <h3>EMG (Muscle Activity) - Raw (Blue) & Envelope (Orange)</h3>
        <canvas id="emgCanvas" width="1000" height="250"></canvas>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const bpmDisplay = document.getElementById('bpmValue');
        
        const ecgCtx = document.getElementById('ecgCanvas').getContext('2d');
        const emgCtx = document.getElementById('emgCanvas').getContext('2d');

        let port;
        let reader;
        let keepReading = false;

        const maxSamples = 1000; // 2 seconds at 500Hz
        
        // Data arrays
        let ecgData = new Array(maxSamples).fill(0);
        let qrsData = new Array(maxSamples).fill(0);
        let emgAcData = new Array(maxSamples).fill(0);
        let emgEnvData = new Array(maxSamples).fill(0);

        // Auto-scaling trackers
        let ecgMin = -100, ecgMax = 100;
        let emgMin = -0.5, emgMax = 0.5;

        connectBtn.addEventListener('click', async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                keepReading = true;
                readLoop();
                requestAnimationFrame(drawPlots);
            } catch (err) {
                console.error(err);
                alert("Connection failed. Make sure Arduino IDE is closed.");
            }
        });

        disconnectBtn.addEventListener('click', async () => {
            keepReading = false;
            if (reader) await reader.cancel();
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            bpmDisplay.innerText = "--";
        });

        async function readLoop() {
            const textDecoder = new TextDecoderStream();
            port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();
            let incomingData = "";

            try {
                while (keepReading) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    incomingData += value;
                    const lines = incomingData.split('\n');
                    incomingData = lines.pop(); // Keep partial line

                    for (const line of lines) {
                        const parts = line.split(',');
                        if (parts.length === 5) {
                            ecgData.push(parseFloat(parts[0]) || 0);
                            qrsData.push(parseFloat(parts[1]) || 0);
                            
                            // Update BPM UI
                            const bpm = parseFloat(parts[2]);
                            if (bpm > 0) bpmDisplay.innerText = Math.round(bpm);

                            emgAcData.push(parseFloat(parts[3]) || 0);
                            emgEnvData.push(parseFloat(parts[4]) || 0);
                            
                            // Maintain array sizes
                            ecgData.shift(); qrsData.shift();
                            emgAcData.shift(); emgEnvData.shift();
                        }
                    }
                }
            } finally {
                reader.releaseLock();
                await port.close();
            }
        }

        function drawGrid(ctx, width, height) {
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i=0; i<height; i+=50) { ctx.moveTo(0, i); ctx.lineTo(width, i); }
            for(let i=0; i<width; i+=50) { ctx.moveTo(i, 0); ctx.lineTo(i, height); }
            ctx.stroke();
        }

        function drawPlots() {
            if (!keepReading) return;

            const width = 1000;
            const height = 250;
            const stepX = width / maxSamples;

            // --- Draw ECG ---
            ecgCtx.clearRect(0, 0, width, height);
            drawGrid(ecgCtx, width, height);

            const cEcgMin = Math.min(...ecgData);
            const cEcgMax = Math.max(...ecgData);
            ecgMin = ecgMin * 0.95 + cEcgMin * 0.05;
            ecgMax = ecgMax * 0.95 + cEcgMax * 0.05;
            const ecgRange = (ecgMax - ecgMin) || 1;

            // QRS markers
            ecgCtx.fillStyle = 'rgba(255, 51, 102, 0.3)';
            for (let i = 0; i < maxSamples; i++) {
                if (qrsData[i] > 0) ecgCtx.fillRect(i * stepX - 2, 0, 4, height);
            }

            // ECG Signal
            ecgCtx.strokeStyle = '#00ff66';
            ecgCtx.lineWidth = 2;
            ecgCtx.beginPath();
            for (let i = 0; i < maxSamples; i++) {
                const x = i * stepX;
                const y = height - (((ecgData[i] - ecgMin) / ecgRange) * height);
                i === 0 ? ecgCtx.moveTo(x, y) : ecgCtx.lineTo(x, y);
            }
            ecgCtx.stroke();


            // --- Draw EMG ---
            emgCtx.clearRect(0, 0, width, height);
            drawGrid(emgCtx, width, height);

            const cEmgMin = Math.min(...emgAcData);
            const cEmgMax = Math.max(...emgAcData);
            // Lock minimum scale so baseline noise doesn't look huge
            emgMin = Math.min(-0.2, emgMin * 0.95 + cEmgMin * 0.05);
            emgMax = Math.max(0.2, emgMax * 0.95 + cEmgMax * 0.05);
            const emgRange = (emgMax - emgMin) || 1;

            // EMG AC (Raw)
            emgCtx.strokeStyle = '#3399ff'; // Blue
            emgCtx.lineWidth = 1.5;
            emgCtx.beginPath();
            for (let i = 0; i < maxSamples; i++) {
                const x = i * stepX;
                const y = height - (((emgAcData[i] - emgMin) / emgRange) * height);
                i === 0 ? emgCtx.moveTo(x, y) : emgCtx.lineTo(x, y);
            }
            emgCtx.stroke();

            // EMG Envelope (Smoothed)
            emgCtx.strokeStyle = '#ffcc00'; // Orange/Yellow
            emgCtx.lineWidth = 3;
            emgCtx.beginPath();
            for (let i = 0; i < maxSamples; i++) {
                const x = i * stepX;
                const y = height - (((emgEnvData[i] - emgMin) / emgRange) * height);
                i === 0 ? emgCtx.moveTo(x, y) : emgCtx.lineTo(x, y);
            }
            emgCtx.stroke();

            requestAnimationFrame(drawPlots);
        }
    </script>
</body>
</html>
